version: "3.9"
  # ── FlareSolverr ─────────────────────────────────────────────────────────
  # Agora gerenciado em jackett/docker-compose.yml (app separado no ZimaOS).
  # Mantido aqui apenas como referência; remova se usar o compose separado.

  # ── Jackett ──────────────────────────────────────────────────────────────
  # Agora gerenciado em jackett/docker-compose.yml (app separado no ZimaOS).
  # Acesse :9117 para configurar indexers e pegar a API Key.


  musicsage:
    build:
      context: .
      dockerfile: musicsage/Dockerfile
    image: musicsage:latest
    container_name: musicsage
    depends_on:
      - plex
    ports:
      - "${MUSICSAGE_PORT:-3002}:3002"
    environment:
      - PLEX_URL=http://192.168.15.94:32400
      - PLEX_CONFIG_DIR=/plex-config
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.15.94:11434}
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_DEFAULT_MODEL:-gemma4:e4b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - PLEX_MEDIA_PATH=/media
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
      # Jackett roda em app separado (jackett/docker-compose.yml).
      # Após configurar, cole a API Key abaixo e reinicie o Sage.
      - JACKETT_URL=${JACKETT_URL:-http://192.168.15.14:9117}
      - JACKETT_API_KEY=${JACKETT_API_KEY:-}
    volumes:
      - ./musicsage/data:/data
      - ./musicsage-logs:/data/logs
      - ./config:/plex-config:ro
      - ./music:/media/music:ro
      - ./movies:/media/movies:ro
      - ./tv:/media/tv:ro
      - musicsage-downloads:/downloads
      # Config do Jackett montada read-only — Sage lê a API Key automaticamente.
      # Não precisa definir JACKETT_API_KEY manualmente.
      - /media/firstBlood/sage/jackett-config:/jackett-config:ro
    network_mode: host
    restart: unless-stopped

volumes:
  musicsage-downloads:
